<!DOCTYPE html>
<html>
<head>
<title>Welcome - MindMitra</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: linear-gradient(to bottom, #a1c4fd, #c2e9fb);
    text-align: center;
}

/* Main Title */
h1 {
    position: absolute;
    width: 100%;
    top: 20px;
    font-size: 36px;
    color: #333;
}

/* Rainbow subtitle */
h2 {
    position: absolute;
    width: 100%;
    top: 70px;
    font-size: 24px;
    font-weight: bold;
    background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: glow 2s infinite alternate;
}

/* Glow effect */
@keyframes glow {
    from { text-shadow: 0 0 5px white; }
    to { text-shadow: 0 0 20px white; }
}

/* Bubble */
.bubble {
    position: absolute;
    border-radius: 50%;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    animation: float linear infinite;
    opacity: 0.9;
    font-size: 14px;
    padding: 10px;
}

/* Floating animation */
@keyframes float {
    from {
        transform: translateY(100vh);
    }
    to {
        transform: translateY(-120vh);
    }
}
</style>
</head>
<body>

<h1>How are you feeling today?</h1>
<h2>Click your bubble to burst your feelings</h2>

<script>
const feelings = [
"Stress","Anxiety","Depression","Lonely","Happy","Calm",
"Angry","Overwhelmed","Tired","Confused","Hopeful","Relaxed",
"Worried","Fear","Panic","Sad","Excited","Motivated",
"Peaceful","Burnout","Pressure","Insecure","Loved","Grateful",
"Frustrated","Nervous","Empty","Strong","Healing","Brave"
];

function createBubble(){
    const bubble = document.createElement("div");
    bubble.className = "bubble";

    // Random text
    bubble.innerText = feelings[Math.floor(Math.random()*feelings.length)];

    // Random size
    const size = Math.random() * 80 + 40;
    bubble.style.width = size + "px";
    bubble.style.height = size + "px";

    // Random horizontal position
    bubble.style.left = Math.random() * window.innerWidth + "px";

    // Random color
    bubble.style.background = `hsl(${Math.random()*360}, 70%, 60%)`;

    // Random animation duration
    bubble.style.animationDuration = (Math.random()*15 + 10) + "s";

    // Click event
    bubble.onclick = function(){
        bubble.style.transform = "scale(1.5)";
        bubble.style.opacity = "0";

        setTimeout(() => {
            window.location.href = "login.html";
        }, 500);
    };

    document.body.appendChild(bubble);

    // Remove bubble after animation
    setTimeout(() => {
        bubble.remove();
    }, 25000);
}

// Create bubbles continuously
setInterval(createBubble, 700);

// Initial bubbles
for(let i=0; i<20; i++){
    createBubble();
}
</script>

</body>
</html>
