<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f4f6f9;
}
.card {
    border: 1px solid gray;
    margin: 15px auto;
    padding: 15px;
    width: 320px;
    border-radius: 10px;
    box-shadow: 0 0 5px gray;
    background: white;
}
button {
    margin: 5px;
    padding: 6px 12px;
    border: none;
    cursor: pointer;
}
.approve {
    background: #4CAF50;
    color: white;
}
.reject {
    background: #f44336;
    color: white;
}
a {
    color: blue;
}
</style>
</head>
<body>

<h1>Admin Approval Panel</h1>
<div id="list"></div>

<script>
async function loadPending(){
    const res = await fetch("http://localhost:3000/pending");
    const users = await res.json();

    let html = "";

    users.forEach(u => {

        // Make social links clickable
        let socialHTML = "";
        if(u.social){
            u.social.forEach(link => {
                if(!link.startsWith("http")){
                    link = "https://" + link;
                }
                socialHTML += `<a href="${link}" target="_blank">${link}</a><br>`;
            });
        }

        // Certificate clickable
        let certHTML = "";
        if(u.certificate){
            certHTML = `<a href="/uploads/${u.certificate}" target="_blank">View Certificate</a>`;
        }

        html += `
        <div class="card">
            <p><b>Name:</b> ${u.name}</p>
            <p><b>Email:</b> ${u.email}</p>
            <p><b>Role:</b> ${u.role}</p>
            <p><b>Social Links:</b><br>${socialHTML}</p>
            <p><b>Certificate:</b><br>${certHTML}</p>

            <button class="approve" onclick="approve('${u._id}')">Approve</button>
            <button class="reject" onclick="reject('${u._id}')">Reject</button>
        </div>
        `;
    });

    document.getElementById("list").innerHTML = html;
}

async function approve(id){
    await fetch("http://localhost:3000/approve", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({id})
    });

    alert("Approved");
    loadPending();
}

async function reject(id){
    await fetch("http://localhost:3000/reject", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({id})
    });

    alert("Rejected");
    loadPending();
}

// Load pending users when page opens
loadPending();
</script>

</body>
</html>
