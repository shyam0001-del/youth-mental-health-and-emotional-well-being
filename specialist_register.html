<!DOCTYPE html>
<html>
<head>
<title>Specialist Register</title>
<style>
body {
    font-family: Arial;
    background: #e1f5fe;
    text-align: center;
}
.container {
    width: 400px;
    margin: 50px auto;
    padding: 20px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
}
input {
    width: 90%;
    padding: 10px;
    margin: 8px;
}
button {
    padding: 10px 20px;
    background: #0288d1;
    color: white;
    border: none;
}
</style>
</head>
<body>

<div class="container">
<h2>Specialist Registration</h2>

<form onsubmit="registerSpecialist(event)" enctype="multipart/form-data">
<input id="name" placeholder="Full Name" required>
<input id="email" placeholder="Email" required>
<input id="specialization" placeholder="Specialization" required>

<label>Upload Certificates</label>
<input id="certificate" type="file" multiple>

<input id="password" type="password" placeholder="Password" required>

<button type="submit">Register Specialist</button>
</form>
</div>

<script>
async function registerSpecialist(event){
    event.preventDefault();

    const formData = new FormData();
    formData.append("name", document.getElementById("name").value);
    formData.append("email", document.getElementById("email").value);
    formData.append("specialization", document.getElementById("specialization").value);
    formData.append("password", document.getElementById("password").value);
    formData.append("role", "specialist");

    const files = certificate.files;
    for(let i=0; i<files.length; i++){
        formData.append("certificate", files[i]);
    }

    await fetch("http://localhost:3000/register", {
        method: "POST",
        body: formData
    });

    alert("Registered. Wait for Admin Approval.");
    window.location.href = "login.html";
}
</script>

</body>
</html>
