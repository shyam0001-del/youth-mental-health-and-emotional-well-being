<!DOCTYPE html>
<html>
<head>
<title>Specialist Register</title>
<style>
body {
    font-family: Arial;
    background: #e1f5fe;
    text-align: center;
}
.container {
    width: 400px;
    margin: 50px auto;
    padding: 20px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
}
input {
    width: 90%;
    padding: 10px;
    margin: 8px;
}
button {
    padding: 10px 20px;
    background: #0288d1;
    color: white;
    border: none;
}
</style>
</head>
<body>

<div class="container">
<h2>Specialist Registration</h2>

<form onsubmit="registerSpecialist(event)">
<input id="name" placeholder="Full Name" required>
<input id="email" placeholder="Email" required>
<input id="specialization" placeholder="Specialization (Psychologist, Therapist etc.)" required>
<input id="certificate" placeholder="Specialization Certificate Link (Google Drive / PDF)">
<input id="password" type="password" placeholder="Password" required>

<button type="submit">Register Specialist</button>
</form>

<p>After registration, wait for Admin Approval.</p>
</div>

<script>
async function registerSpecialist(event){
    event.preventDefault();

    const specialist = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        specialization: document.getElementById("specialization").value,
        certificate: document.getElementById("certificate").value,
        password: document.getElementById("password").value,
        role: "specialist"
    };

    await fetch("http://localhost:3000/register", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(specialist)
    });

    alert("Specialist Registered. Wait for Admin Approval.");
    window.location.href = "login.html";
}
</script>

</body>
</html>
