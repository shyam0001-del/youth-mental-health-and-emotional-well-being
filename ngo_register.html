<!DOCTYPE html>
<html>
<head>
<title>NGO Register</title>
<style>
body {
    font-family: Arial;
    background: #fff3e0;
    text-align: center;
}
.container {
    width: 400px;
    margin: 50px auto;
    padding: 20px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
}
input {
    width: 90%;
    padding: 10px;
    margin: 8px;
}
button {
    padding: 10px 20px;
    background: #ff9800;
    color: white;
    border: none;
    margin-top: 10px;
}
.add-btn {
    background: #4CAF50;
}
</style>
</head>
<body>

<div class="container">
<h2>NGO Registration</h2>

<form onsubmit="registerNGO(event)" enctype="multipart/form-data">
<input id="name" placeholder="NGO Name" required>
<input id="email" placeholder="Email" required>

<div id="socialLinks">
<input class="social" placeholder="Social Media Link">
</div>

<button type="button" class="add-btn" onclick="addSocial()">+ Add Social Link</button>

<br>

<label>Upload Certificate (Optional)</label>
<input type="file" id="certificate">

<input id="password" type="password" placeholder="Password" required>

<button type="submit">Register NGO</button>
</form>

<p>After registration, wait for Admin Approval.</p>
</div>

<script>
function addSocial(){
    const div = document.getElementById("socialLinks");
    const input = document.createElement("input");
    input.className = "social";
    input.placeholder = "Social Media Link";
    div.appendChild(input);
}

async function registerNGO(event){
    event.preventDefault();

    const formData = new FormData();

    formData.append("name", document.getElementById("name").value);
    formData.append("email", document.getElementById("email").value);
    formData.append("password", document.getElementById("password").value);
    formData.append("role", "ngo");

    // Social links
    const socials = document.getElementsByClassName("social");
    let socialLinks = [];
    for(let i=0; i<socials.length; i++){
        if(socials[i].value){
            socialLinks.push(socials[i].value);
        }
    }
    formData.append("social", JSON.stringify(socialLinks));

    // Certificate file
    const file = document.getElementById("certificate").files[0];
    if(file){
        formData.append("certificate", file);
    }

    await fetch("http://localhost:3000/register", {
        method: "POST",
        body: formData
    });

    alert("NGO Registered. Wait for Admin Approval.");
    window.location.href = "login.html";
}
</script>

</body>
</html>
